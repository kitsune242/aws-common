name: "Reusable Plugin CI"

on:
  workflow_call:
    inputs:
      plugin_path:
        required: true
        type: string

jobs:
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd ${{ inputs.plugin_path }}/etl
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run Tests
        run: |
          cd ${{ inputs.plugin_path }}/etl
          if compgen -G "test_*.py" > /dev/null || compgen -G "*_test.py" > /dev/null; then
            python -m pytest -v
          else
            echo "WARNING: No test files found in ${{ inputs.plugin_path }}/etl — add test_ingest.py to enable testing"
          fi
